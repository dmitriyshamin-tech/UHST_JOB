name: E-commerce Candidate Monitor

on:
  # Schedule disabled — uncomment to re-enable daily run at 10:00 Kyiv
  # schedule:
  #   - cron: "0 7 * * *"
  workflow_dispatch:   # manual run only from GitHub Actions UI

permissions:
  contents: write      # needed to commit seen_ids.json back to repo

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          APIFY_API_TOKEN:    ${{ secrets.APIFY_API_TOKEN }}
        run: python main.py

      - name: Commit updated seen_ids.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_ids.json
          git diff --cached --quiet || git commit -m "chore: update seen_ids [skip ci]"
          git push
